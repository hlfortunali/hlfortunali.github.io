        # Zynq7000 ThreadX 
        {:data-align="center"}

        This is an example project to port ThreaX to Zynq7000 chip.

        ## Steps 
        1. Hardware preparation  
        2. Software parparation  
        3. Porting

        ***

        ## Hardware preparation
        In fact any board with Zynq7000 chip is ok. I bought the AX7Z010 board form Alinx.
        ![1](:AX7Z010-1.jpeg)

        ***

        ## Software
        ##### ThreadX
        Download the ThreadX from GitHub. [ThreadX_Github_Link](https://github.com/azure-rtos/threadx)

        ##### Vivado
        After testing, I found the Vivado 2018.3 version was more stable for porting the ThreadX. You can download the IDE form Xilinx website.


